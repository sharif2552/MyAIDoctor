services:
  postgres:
    image: postgres:16-alpine
    container_name: myaidoctor-postgres
    environment:
      POSTGRES_DB: myaidoctor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myaidoctor"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: myaidoctor-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: "/app"
      LOG_LEVEL: "DEBUG"
      DATABASE_URL: "postgresql+psycopg://postgres:postgres@postgres:5432/myaidoctor"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me}"
      CORS_ALLOW_ORIGINS: "http://localhost,http://localhost:3000,http://127.0.0.1,http://127.0.0.1:3000,http://20.197.0.41,http://20.197.0.41:3000,https://seliseproject.sharifsdevlab.me"
      WATCHFILES_FORCE_POLLING: "true"
      LOCAL_DEMO: "${LOCAL_DEMO:-0}"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: "*"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      TAVILY_API_KEY: "${TAVILY_API_KEY}"
      FIRECRAWL_API_KEY: "${FIRECRAWL_API_KEY}"
      LANGSMITH_API_KEY: "${LANGSMITH_API_KEY}"
      LANGSMITH_TRACING: "${LANGSMITH_TRACING:-false}"
      LANGSMITH_PROJECT: "${LANGSMITH_PROJECT:-MyAIDoctor}"
      LANGSMITH_ENDPOINT: "${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}"
    volumes:
      - ./:/app
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: myaidoctor-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: myaidoctor-certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: myaidoctor-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-/api}"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: npm run dev
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
  certbot-certs:
  certbot-www:
